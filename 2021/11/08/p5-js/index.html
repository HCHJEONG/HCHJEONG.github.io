e</span>: <span class="string">&#x27;App&#x27;</span>,</span></span><br><span class="line"><span class="javascript">  <span class="function"><span class="title">mounted</span>(<span class="params"></span>)</span> &#123;</span></span><br><span class="line"><span class="javascript">    <span class="built_in">this</span>.$nextTick(<span class="function">() =&gt;</span> &#123;</span></span><br><span class="line"><span class="javascript">      <span class="keyword">const</span> w = <span class="built_in">document</span>.querySelector(<span class="string">&#x27;#canvas&#x27;</span>).offsetWidth;</span></span><br><span class="line"><span class="javascript">      <span class="keyword">const</span> h = <span class="built_in">document</span>.querySelector(<span class="string">&#x27;#canvas&#x27;</span>).offsetHeight;</span></span><br><span class="line"><span class="javascript">      createP5(<span class="string">&#x27;canvas&#x27;</span>, w, h, <span class="string">&#x27;grey&#x27;</span>);</span></span><br><span class="line"><span class="javascript">    &#125;);</span></span><br><span class="line"><span class="javascript">  &#125;,</span></span><br><span class="line"><span class="javascript">&#125;;</span></span><br><span class="line"><span class="javascript"></span><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">style</span>&gt;</span><span class="css"></span></span><br><span class="line"><span class="css"><span class="selector-class">.v-canvas</span></span></span><br><span class="line"><span class="css">&#123;</span></span><br><span class="line"><span class="css">  <span class="attribute">height</span>: <span class="number">65vh</span>;</span></span><br><span class="line"><span class="css">  <span class="attribute">max-height</span>: <span class="number">500px</span>;</span></span><br><span class="line"><span class="css">&#125;</span></span><br><span class <figure class="highlight js"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> P5 <span class="keyword">from</span> <span class="string">&#x27;p5&#x27;</span>;</span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">createP5</span>(<span class="params">parentId, w, h, backgroundColor</span>) </span>&#123;</span><br><span class="line">  </span><br><span class="line">  <span class="keyword">const</span> sketch = <span class="function">(<span class="params">p</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="keyword">const</span> p5 = p;</span><br><span class="line">    p5.setup = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">      p5.createCanvas(w, h, p5.WEBGL);</span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    p5.draw = <span class="function">() =&gt;</span> &#123;</span><br><span class="line">      p5.background(backgroundColor);</span><br><span class="line">      p5.ambientLight(<span class="number">255</span>);</span><br><span class="line">      p5.directionalLight(<span class="number">255
